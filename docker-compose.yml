services:
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: jaeger
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP  ← collector.py exports here
      - "16686:16686" # Jaeger UI  ← http://localhost:16686
    environment:
      - COLLECTOR_OTLP_ENABLED=true
